<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Quality Assistant</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>AI QA Tester Assistant</h1>

    <p class="subtitle">
        Automatyczne wsparcie testera oprogramowania dzięki Gemini AI
    </p>

    <div class="form-container">

        <select id="language">
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="java">Java</option>
            <option value="csharp">C#</option>
        </select>

        <textarea
                id="code-input"
                placeholder="Wklej kod do analizy..."
        ></textarea>

        <button id="analyze-btn">
            Analizuj Kod i Generuj Testy
        </button>

        <button id="example-btn" class="secondary-btn">
            Wczytaj Przykład
        </button>

    </div>

    <div class="results-container">

        <h2>Wyniki Analizy QA</h2>

        <div id="error-message" class="error-message" style="display: none;"></div>

        <div class="result-card">
            <h3>Ocena Jakości (0-10)</h3>
            <p id="score">-</p>
        </div>

        <div class="result-card">
            <h3>Wykryte Błędy i Ryzyka</h3>
            <ul id="issues-list">
                <li>Brak analizy</li>
            </ul>
        </div>

        <div class="result-card">
            <h3>Sugestie Poprawy</h3>
            <ul id="suggestions-list">
                <li>Brak sugestii</li>
            </ul>
        </div>

        <div class="result-card">
            <h3>Scenariusze Testowe</h3>
            <ul id="test-scenarios-list">
                <li>Brak scenariuszy</li>
            </ul>
        </div>

        <div class="result-card">
            <h3>Poprawiona Wersja Kodu</h3>
            <div class="corrected-code-container">
                <pre id="corrected-code">No corrected code yet</pre>
                <button id="copy-btn" class="copy-button" style="display: none;">
                    Copy to Clipboard
                </button>
            </div>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
